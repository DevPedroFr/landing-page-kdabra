<svg viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Cormorant Garamond', Georgia, serif;">
  <!-- Background dark (opcional para preview) -->
  <rect width="280" height="80" rx="16" fill="#0a0a0c"/>

  <!-- Logo mark container (rounded square with yellow tint) -->
  <rect x="12" y="12" width="56" height="56" rx="14" fill="url(#markBg)" stroke="rgba(245,194,0,0.28)" stroke-width="1"/>

  <!-- Icon SVG (32x32 centered inside 56x56 box at x=12,y=12 → center 40,40) -->
  <g transform="translate(12,12)">
    <!-- Cauldron / caldeirão -->
    <ellipse cx="28" cy="22" rx="17" ry="5" stroke="#f0f0f2" stroke-width="3" fill="none"/>
    <path d="M15 27H41L38.8 43C38.5 45.5 36.4 47.4 33.9 47.4H22.1C19.6 47.4 17.5 45.5 17.2 43L15 27Z" fill="rgba(240,240,242,0.36)" stroke="#f0f0f2" stroke-width="3"/>
    <!-- Varinha / sparkles -->
    <path d="M37 9L49 3" stroke="#f0f0f2" stroke-width="3" stroke-linecap="round"/>
    <path d="M41.5 5.5L51 0.5" stroke="#F5C200" stroke-width="3" stroke-linecap="round"/>
    <path d="M44 12.5L46.5 10.5" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M18 13L19.5 15" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M22 8.5L23.5 10.5" stroke="#F5C200" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: KDABRA -->
  <text x="82" y="47" fill="#f0f0f2" font-size="33" font-weight="600" font-family="'Cormorant Garamond', Georgia, serif" letter-spacing="1">KDABRA</text>

  <!-- Tagline -->
  <text x="84" y="60" fill="rgba(240,240,242,0.55)" font-size="8" font-family="'DM Mono', 'Courier New', monospace" letter-spacing="4" text-transform="uppercase">MAGIA EM TECNOLOGIA</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="markBg" x1="12" y1="12" x2="12" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5C200" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F5C200" stop-opacity="0.07"/>
    </linearGradient>
  </defs>
</svg>
